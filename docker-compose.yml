services:
  postgres:
    image: postgres:16.6-alpine3.21
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usdt_rates
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
      - "9090:9090"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: usdt_rates
      DB_SSLMODE: disable
      GRPC_PORT: "50051"
      METRICS_PORT: "9090"
      GRINEX_API_URL: "https://api.grinex.io"
      GRINEX_MARKET: "usdtrub"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  pgdata:
